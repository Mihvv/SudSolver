name: Release a new version
run-name: Release a new version

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Flutter Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          channel: stable

      - name: Create Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/gradle.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"     >> android/gradle.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}"           >> android/gradle.properties

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Apps
        run: |
          flutter build apk --split-per-abi
          flutter build apk
          flutter build appbundle

      - name: Prepare Files
        run: |
          mkdir -p release-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk release-artifacts/sudsolver-full.apk
          for abi in arm64-v8a armeabi-v7a x86_64; do
            src="build/app/outputs/flutter-apk/app-${abi}-release.apk"
            [ -f "$src" ] && cp "$src" "release-artifacts/sudsolver-${abi}.apk"
          done
          cp build/app/outputs/bundle/release/app-release.aab release-artifacts/sudsolver.aab

      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configurationJson: .github/changelog-config.json
          commitMode: true
          fetchReleaseInformation: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.build_changelog.outputs.changelog }}
          files: |
            release-artifacts/*.apk
            release-artifacts/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
